<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>老婆点菜</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #fff5f5; --card: #fff; --accent: #e74c3c; --accent2: #f39c12;
            --text: #2c3e50; --text2: #7f8c8d; --border: #f0e0e0;
            --shadow: 0 2px 12px rgba(0,0,0,0.06); --radius: 14px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px;
        }
        header {
            position: sticky; top: 0; z-index: 10;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            padding: 18px 20px; color: white;
            box-shadow: 0 2px 20px rgba(231,76,60,0.3);
        }
        header h1 { font-size: 22px; font-weight: 700; }
        header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 2px; }
        .tabs {
            display: flex; gap: 4px; padding: 12px 16px;
            position: sticky; top: 72px; z-index: 5; background: var(--bg);
        }
        .tab {
            flex: 1; padding: 10px 0; text-align: center; border-radius: 10px;
            cursor: pointer; font-size: 14px; font-weight: 600;
            background: var(--card); color: var(--text2);
            border: 1px solid var(--border); transition: all 0.2s;
        }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
        .search-bar { margin: 0 16px 12px; display: flex; gap: 8px; }
        .search-bar input {
            flex: 1; padding: 12px 16px; border-radius: 12px;
            border: 1px solid var(--border); font-size: 15px; background: var(--card);
        }
        .search-bar button {
            padding: 12px 20px; background: var(--accent);
            color: white; border: none; border-radius: 12px;
            font-size: 15px; cursor: pointer; font-weight: 600;
        }
        .filters {
            display: flex; gap: 8px; padding: 0 16px 12px; overflow-x: auto;
        }
        .filters::-webkit-scrollbar { display: none; }
        .filters { flex-wrap: wrap; row-gap: 6px; }
        .filter-chip {
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid var(--border); background: var(--card);
            font-size: 13px; cursor: pointer; white-space: nowrap; color: var(--text2);
        }
        .filter-chip.active {
            background: var(--accent2); color: white; border-color: var(--accent2);
        }
        .context-input { margin: 0 16px 12px; display: none; gap: 8px; }
        .context-input.show { display: flex; }
        .context-input input {
            flex: 1; padding: 12px 16px; border-radius: 12px;
            border: 1px solid var(--border); font-size: 15px; background: var(--card);
        }
        .context-input button {
            padding: 12px 16px; background: var(--accent2);
            color: white; border: none; border-radius: 12px;
            font-size: 14px; cursor: pointer; font-weight: 600;
        }
        .card-list { padding: 0 16px; }
        .card {
            background: var(--card); border-radius: var(--radius);
            padding: 18px; margin-bottom: 12px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            cursor: pointer; transition: all 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card .name { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .card .meta { display: flex; gap: 12px; margin-bottom: 8px; }
        .tag {
            font-size: 12px; padding: 3px 10px; border-radius: 10px; font-weight: 600;
        }
        .tag-easy { background: #e8f5e9; color: #27ae60; }
        .tag-medium { background: #fff3e0; color: #f39c12; }
        .tag-hard { background: #fce4ec; color: #e74c3c; }
        .card .time { font-size: 13px; color: var(--text2); }
        .card .ingredients { display: flex; flex-wrap: wrap; gap: 6px; font-size: 13px; }
        .ingredient {
            background: #fef5e7; padding: 2px 10px; border-radius: 10px;
            font-size: 12px; color: #e67e22;
        }
        .card .reasons { margin-top: 8px; font-size: 12px; color: var(--accent); font-weight: 600; }
        .card .actions { display: flex; gap: 8px; margin-top: 12px; }
        .btn {
            padding: 8px 16px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--card);
            font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        .btn-like { color: #27ae60; border-color: #27ae60; }
        .btn-like.active { background: #27ae60; color: white; }
        .btn-dislike { color: #e74c3c; border-color: #e74c3c; }
        .btn-dislike.active { background: #e74c3c; color: white; }
        .btn-order {
            background: var(--accent); color: white; border: none;
            flex: 1; text-align: center;
        }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 100;
            display: flex; align-items: flex-end; justify-content: center;
        }
        .modal-content {
            background: var(--card); width: 100%; max-width: 500px;
            border-radius: 20px 20px 0 0; padding: 24px;
            max-height: 80vh; overflow-y: auto;
        }
        .modal h2 { font-size: 22px; margin-bottom: 12px; }
        .modal .step {
            padding: 10px 0; border-bottom: 1px solid var(--border);
            display: flex; gap: 12px; font-size: 15px;
        }
        .step-num {
            width: 28px; height: 28px; background: var(--accent);
            color: white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; flex-shrink: 0;
        }
        .btn-close {
            width: 100%; padding: 14px; background: var(--accent);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 12px;
        }
        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: #2c3e50; color: white; padding: 12px 24px;
            border-radius: 24px; font-size: 14px; font-weight: 600;
            z-index: 200; opacity: 0; transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
        .empty { text-align: center; padding: 40px 20px; color: var(--text2); }
        .profile-bar {
            margin: 0 16px 12px; padding: 12px 16px;
            background: var(--card); border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
            font-size: 13px; color: var(--text2);
        }
    
        /* ── Desktop Layout (>768px) ── */
        @media (min-width: 768px) {
            body {
                max-width: 1200px;
                margin: 0 auto;
                background: #fafafa;
            }
            
            header {
                border-radius: 0 0 20px 20px;
                padding: 24px 32px;
            }
            header h1 { font-size: 28px; }
            
            .tabs {
                max-width: 600px;
                margin: 0 auto;
                position: static;
                padding: 20px 0 12px;
                background: transparent;
            }
            
            .search-bar {
                max-width: 600px;
                margin: 0 auto 16px;
            }
            
            .filters {
                max-width: 600px;
                margin: 0 auto 16px;
                justify-content: center;
            }
            
            .context-input {
                max-width: 600px;
                margin: 0 auto 16px;
            }
            
            .card-list {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
                max-width: 900px;
                margin: 0 auto;
                padding: 0 24px;
            }
            
            .card {
                margin-bottom: 0;
                transition: transform 0.2s, box-shadow 0.2s;
            }
            .card:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            }
            .card:active { transform: scale(0.99); }
            
            .profile-bar {
                max-width: 600px;
                margin: 0 auto 16px;
            }
            
            #profile-view {
                max-width: 600px;
                margin: 0 auto;
            }
            
            .modal-content {
                border-radius: 20px;
                max-width: 600px;
                max-height: 85vh;
            }
            
            .toast {
                bottom: 40px;
                font-size: 15px;
                padding: 14px 28px;
            }
        }
        
        /* ── Large Desktop (>1024px) ── */
        @media (min-width: 1024px) {
            .card-list {
                grid-template-columns: repeat(3, 1fr);
                max-width: 1100px;
            }
            
            .card {
                padding: 24px;
            }
            
            .card .name { font-size: 20px; }
        }
</style>
</head>
<body>
    <header>
        <h1>老婆点菜</h1>
        <div class="subtitle" id="header-sub">你的专属智能菜单</div>
    </header>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('recommend')">今日推荐</div>
        <div class="tab" onclick="switchTab('context')">想吃什么</div>
        <div class="tab" onclick="switchTab('browse')">全部菜谱</div>
        <div class="tab" onclick="switchTab('profile')">我的口味</div>
    </div>
    
    <div class="search-bar" id="search-bar" style="display:none">
        <input type="text" placeholder="搜菜名、搜食材..." id="search-input" oninput="search()">
    </div>
    
    <div class="filters" id="filters" style="display:none">
        <button class="filter-chip active" onclick="setFilter('all', this)">全部</button>
        <button class="filter-chip" onclick="setFilter('下饭', this)">下饭</button>
        <button class="filter-chip" onclick="setFilter('麻辣', this)">麻辣</button>
        <button class="filter-chip" onclick="setFilter('清淡', this)">清淡</button>
        <button class="filter-chip" onclick="setFilter('酸甜', this)">酸甜</button>
        <button class="filter-chip" onclick="setFilter('鲜香', this)">鲜香</button>
        <button class="filter-chip" onclick="setFilter('爽口', this)">爽口</button>
        <button class="filter-chip" onclick="setFilter('浓郁', this)">浓郁</button>
        <button class="filter-chip" onclick="setFilter('酥脆', this)">酥脆</button>
        <button class="filter-chip" onclick="setFilter('软糯', this)">软糯</button>
        <button class="filter-chip" onclick="setFilter('开胃', this)">开胃</button>
        <button class="filter-chip" onclick="setFilter('快手', this)">快手菜</button>
    </div>
    
    <div class="context-input" id="context-input">
        <input type="text" placeholder="想吃辣的、想吃肉、来点清爽的..." id="context-query">
        <button onclick="recommendContext()">找菜</button>
    </div>
    
    <div class="card-list" id="card-list"></div>
    <div id="profile-view" style="display:none; padding: 0 16px;"></div>
    
    <div class="modal" id="modal" style="display:none" onclick="closeModal(event)">
        <div class="modal-content" id="modal-content" onclick="event.stopPropagation()"></div>
    </div>
    
    <div class="toast" id="toast"></div>

<script>
var API = '';
var currentTab = 'recommend';
var currentFilter = 'all';
var allRecipes = [];
var profile = {};
var _currentRecipes = [];

async function init() {
    try {
        await Promise.all([loadRecipes(), loadProfile()]);
        switchTab('recommend');
    } catch(e) {
        console.error('Init failed:', e);
        document.getElementById('card-list').innerHTML = '<div class="empty">加载失败，请刷新页面重试</div>';
    }
}

async function loadRecipes() {
    var res = await fetch(API + '/api/recipes/all');
    var data = await res.json();
    allRecipes = data.recipes || [];
}

async function loadProfile() {
    var res = await fetch(API + '/api/user/profile');
    profile = await res.json();
}

function switchTab(tab) {
    currentTab = tab;
    var tabs = document.querySelectorAll('.tab');
    var tabNames = ['recommend','context','browse','profile'];
    tabs.forEach(function(t, i) {
        t.classList.toggle('active', tabNames[i] === tab);
    });
    
    document.getElementById('search-bar').style.display = tab === 'browse' ? 'flex' : 'none';
    document.getElementById('filters').style.display = tab === 'browse' ? 'flex' : 'none';
    document.getElementById('context-input').classList.toggle('show', tab === 'context');
    document.getElementById('profile-view').style.display = tab === 'profile' ? 'block' : 'none';
    document.getElementById('card-list').style.display = tab !== 'profile' ? 'block' : 'none';
    
    if (tab === 'recommend') loadRecommend();
    else if (tab === 'context') { document.getElementById('context-query').focus(); renderCards([]); }
    else if (tab === 'browse') { document.getElementById('search-input').value = ''; renderAll(); }
    else if (tab === 'profile') renderProfile();
}

async function loadRecommend() {
    var res = await fetch(API + '/api/recommend/daily');
    var data = await res.json();
    document.getElementById('header-sub').textContent = '今日为你精选';
    renderCards(data.recommendations || []);
}

async function recommendContext() {
    var query = document.getElementById('context-query').value.trim();
    if (!query) return;
    var res = await fetch(API + '/api/recommend/context', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({context: query})
    });
    var data = await res.json();
    document.getElementById('header-sub').textContent = '"' + query + '" 的推荐';
    renderCards(data.recommendations || []);
}

function search() {
    var keyword = document.getElementById('search-input').value.toLowerCase();
    if (!keyword) { renderAll(); return; }
    var filtered = allRecipes.filter(function(r) {
        return r.name.toLowerCase().indexOf(keyword) >= 0 ||
            r.ingredients.some(function(i) { return i.toLowerCase().indexOf(keyword) >= 0; });
    });
    renderCards(filtered);
}

function setFilter(filter, el) {
    currentFilter = filter;
    var chips = document.querySelectorAll('.filter-chip');
    chips.forEach(function(c) { c.classList.remove('active'); });
    el.classList.add('active');
    renderAll();
}

function renderAll() {
    var recipes = allRecipes.slice();
    
    // Category-based filters
    var tasteKeywords = {
        '下饭': ['红烧','焖','炖','酱','烧','卤','回锅','干煸','宫保','鱼香','麻婆','水煮','小炒','肉末','蒜蓉','蚝油','锅包','京酱','黄焖','咖喱','番茄'],
        '麻辣': ['麻辣','辣','辣椒','花椒','干辣椒','红油','剁椒','泡椒','豆瓣','麻婆','水煮','辣子','香辣','酸辣','藤椒'],
        '清淡': ['清蒸','白灼','清炒','水煮','蒸','煮','焯','素','凉拌','青菜','豆腐','粥','汤'],
        '酸甜': ['糖醋','酸甜','茄汁','番茄','柠檬','菠萝','橙汁','山楂','酸梅'],
        '鲜香': ['鲜','香','蚝油','蒜蓉','葱油','菌菇','三鲜','上汤','高汤','鲍汁','虾','蟹','贝'],
        '爽口': ['凉拌','凉','拍黄瓜','沙拉','生菜','清脆','爽口','醋','酸辣','泡菜','酸'],
        '浓郁': ['红烧','炖','焖','煲','卤','咖喱','奶油','芝士','黄油','浓汤','砂锅','东坡','佛跳墙'],
        '酥脆': ['脆','酥','炸','煎','烤','脆皮','香酥','干煸','爆','锅巴','排'],
        '软糯': ['糯','粉蒸','炖','焖','煲','红烧肉','东坡肉','扣肉','蹄','肘','牛腩','芋头','山药'],
        '开胃': ['酸','辣','醋','泡','腌','糟','开胃','下饭','鱼香','糖醋','酸辣','麻辣','凉拌'],
        '快手': [],
    };
    
    if (tasteKeywords[currentFilter]) {
        var kws = tasteKeywords[currentFilter];
        if (currentFilter === '快手') {
            recipes = recipes.filter(function(r) {
                var t = r.time || ''; var m = parseInt(t); return m && m <= 20;
            });
        } else {
            recipes = recipes.filter(function(r) {
                var text = r.name + ' ' + (r.ingredients || []).join(' ');
                return kws.some(function(kw) { return text.indexOf(kw) >= 0; });
            });
        }
    
    
    var keyword = document.getElementById('search-input').value.toLowerCase();
    if (keyword) {
        recipes = recipes.filter(function(r) {
            return r.name.toLowerCase().indexOf(keyword) >= 0 ||
                r.ingredients.some(function(i) { return i.toLowerCase().indexOf(keyword) >= 0; });
        });
    }
    
    document.getElementById('header-sub').textContent = '共 ' + recipes.length + ' 道菜';
    renderCards(recipes);
}

function renderCards(recipes) {
    var container = document.getElementById('card-list');
    if (!recipes.length) {
        container.innerHTML = '<div class="empty">没有找到匹配的菜，试试换个说法？</div>';
        return;
    }
    
    _currentRecipes = recipes;
    var html = '';
    for (var i = 0; i < recipes.length; i++) {
        var r = recipes[i];
        var diffClass = r.difficulty === '简单' ? 'tag-easy' : r.difficulty === '困难' ? 'tag-hard' : 'tag-medium';
        var reasonsHtml = r._reasons ? '<div class="reasons">' + r._reasons.join(' ') + '</div>' : '';
        var isFav = (profile.favorites || []).indexOf(r.name) >= 0;
        var isDis = (profile.dislikes || []).indexOf(r.name) >= 0;
        var scoreStar = r._score > 80 ? ' ⭐' : '';
        var ings = (r.ingredients || []).slice(0, 6).map(function(ing) {
            return '<span class="ingredient">' + ing + '</span>';
        }).join('');
        
        html += '<div class="card" onclick="openDetail(' + i + ')">';
        html += '<div class="name">' + r.name + scoreStar + '</div>';
        html += '<div class="meta">';
        html += '<span class="tag ' + diffClass + '">' + (r.difficulty || '?') + '</span>';
        html += '<span class="time">' + (r.time || '?') + '</span>';
        html += '</div>';
        html += '<div class="ingredients">' + ings + '</div>';
        html += reasonsHtml;
        html += '<div class="actions" onclick="event.stopPropagation()">';
        html += '<button class="btn btn-like' + (isFav ? ' active' : '') + '" onclick="toggleFavorite(\'' + r.name.replace(/'/g, "\\'") + '\', this)">' + (isFav ? '❤️' : '🤍') + ' 喜欢</button>';
        html += '<button class="btn btn-dislike' + (isDis ? ' active' : '') + '" onclick="toggleDislike(\'' + r.name.replace(/'/g, "\\'") + '\', this)">不吃</button>';
        html += '<button class="btn btn-order" onclick="orderDish(\'' + r.name.replace(/'/g, "\\'") + '\', this)">就吃这个</button>';
        html += '</div></div>';
    }
    container.innerHTML = html;
}

function openDetail(idx) {
    var r = _currentRecipes[idx];
    if (!r) return;
    var diffClass = r.difficulty === '简单' ? 'tag-easy' : r.difficulty === '困难' ? 'tag-hard' : 'tag-medium';
    var stepsHtml = (r.steps || []).map(function(s, i) {
        return '<div class="step"><span class="step-num">' + (i+1) + '</span><span>' + s + '</span></div>';
    }).join('');
    
    var content = document.getElementById('modal-content');
    content.innerHTML = '<h2>' + r.name + '</h2>' +
        '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">' +
        '<span class="tag ' + diffClass + '">' + (r.difficulty || '?') + '</span>' +
        '<span style="font-size:13px;color:#7f8c8d">' + (r.time || '?') + '</span></div>' +
        '<div style="font-size:14px;color:#7f8c8d;margin-bottom:8px">食材：' + (r.ingredients || []).join('、') + '</div>' +
        '<h3 style="margin:16px 0 8px">做法</h3>' +
        '<div>' + stepsHtml + '</div>' +
        '<button class="btn-close" onclick="closeModal()">知道了</button>';
    document.getElementById('modal').style.display = 'flex';
}

function closeModal(e) {
    if (e && e.target !== document.getElementById('modal')) return;
    document.getElementById('modal').style.display = 'none';
}

async function toggleFavorite(name, btn) {
    var isFav = (profile.favorites || []).indexOf(name) >= 0;
    var url = API + (isFav ? '/api/user/unfavorite' : '/api/user/favorite');
    var res = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({dish: name})
    });
    profile = await res.json();
    toast(isFav ? '已取消收藏' : '已加入收藏');
    refreshCurrentView();
}

async function toggleDislike(name, btn) {
    var isDis = (profile.dislikes || []).indexOf(name) >= 0;
    var url = API + (isDis ? '/api/user/undislike' : '/api/user/dislike');
    var res = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({dish: name})
    });
    profile = await res.json();
    toast(isDis ? '已取消' : '已标记不喜欢');
    refreshCurrentView();
}

async function orderDish(name, btn) {
    var res = await fetch(API + '/api/order', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({dish: name})
    });
    await res.json();
    toast('今天吃「' + name + '」！已记录');
    await loadProfile();
}

function refreshCurrentView() {
    if (currentTab === 'recommend') loadRecommend();
    else if (currentTab === 'browse') renderAll();
}

function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2000);
}

function renderProfile() {
    var view = document.getElementById('profile-view');
    var taste = profile.taste || {};
    var pref = profile.preferences || {};
    var stats = profile.stats || {};
    var tasteLabels = {
        spiciness: ['不吃辣','微微辣','微辣','中辣','很辣','无辣不欢'],
        saltiness: ['极淡','偏淡','正常','偏咸','很咸','重咸'],
        sweetness: ['不甜','微甜','正常','偏甜','很甜','嗜甜'],
        sourness: ['不酸','微酸','正常','偏酸','很酸','嗜酸']
    };
    var tasteNames = {spiciness:'辣度', saltiness:'咸度', sweetness:'甜度', sourness:'酸度'};
    var tasteEmoji = {spiciness:'🌶', saltiness:'🧂', sweetness:'🍬', sourness:'🍋'};
    
    var tasteHtml = '';
    Object.keys(taste).forEach(function(key) {
        var val = taste[key] || 0;
        var labels = tasteLabels[key] || ['?','?','?','?','?','?'];
        tasteHtml += '<div style="margin-bottom:12px">' +
            '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">' +
            '<span>' + (tasteEmoji[key]||'') + ' ' + (tasteNames[key]||key) + '</span>' +
            '<span style="color:#e74c3c;font-weight:600">' + labels[val] + '</span></div>' +
            '<div style="display:flex;gap:4px">';
        for (var i = 0; i <= 5; i++) {
            tasteHtml += '<div style="flex:1;height:6px;border-radius:3px;background:' + (i <= val ? '#e74c3c' : '#f0e0e0') + '"></div>';
        }
        tasteHtml += '</div></div>';
    });
    
    var topDishes = profile.top_dishes || [];
    var topHtml = '';
    if (topDishes.length) {
        topDishes.forEach(function(d, i) {
            topHtml += '<div style="padding:6px 0;border-bottom:1px solid #f0e0e0;display:flex;justify-content:space-between">' +
                '<span>' + (i+1) + '. ' + d.name + '</span>' +
                '<span style="color:#7f8c8d;font-size:12px">' + d.count + '次</span></div>';
        });
    } else {
        topHtml = '<div style="color:#7f8c8d;font-size:13px">还没有点菜记录</div>';
    }
    
    var favCuisines = (pref.favorite_cuisines || []).map(function(c) {
        return '<span style="background:#fce4ec;color:#e74c3c;padding:2px 10px;border-radius:10px;font-size:12px;margin:2px">' + c + '</span>';
    }).join('') || '<span style="color:#7f8c8d;font-size:13px">还没设置</span>';
    
    var disliked = (pref.disliked_ingredients || []).map(function(c) {
        return '<span style="background:#fce4ec;color:#e74c3c;padding:2px 10px;border-radius:10px;font-size:12px;margin:2px">' + c + '</span>';
    }).join('') || '<span style="color:#7f8c8d;font-size:13px">还没有</span>';
    
    view.innerHTML = 
        '<div class="profile-bar" style="margin-bottom:16px">' +
        '<div style="font-size:28px">👩</div>' +
        '<div><div>点菜 <b>' + (stats.total_orders || 0) + '</b> 次</div>' +
        '<div>收藏 <b>' + ((profile.favorites || []).length) + '</b> 道</div></div></div>' +
        '<div class="card" style="margin-bottom:12px"><h3 style="margin-bottom:12px">口味偏好</h3>' + tasteHtml + '</div>' +
        '<div class="card" style="margin-bottom:12px"><h3 style="margin-bottom:8px">喜欢的菜系</h3>' + favCuisines + '</div>' +
        '<div class="card" style="margin-bottom:12px"><h3 style="margin-bottom:8px">不吃的食材</h3>' + disliked + '</div>' +
        '<div class="card" style="margin-bottom:12px"><h3 style="margin-bottom:8px">最常点的菜</h3>' + topHtml + '</div>';
}

init();
</script>
</body>
</html>
