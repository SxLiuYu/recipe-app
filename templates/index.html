<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>иҖҒе©ҶзӮ№иҸң</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f8f6f3; --card: #fff; --accent: #d9776c; --accent2: #e8a87c;
            --text: #3d3432; --text2: #999089; --border: #ede8e2;
            --shadow: 0 2px 16px rgba(0,0,0,0.05); --radius: 16px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px;
        }
        header {
            position: sticky; top: 0; z-index: 10;
            background: linear-gradient(135deg, #d9776c, #c0847a);
            padding: 18px 20px; color: white;
            box-shadow: 0 2px 20px rgba(217,119,108,0.25);
        }
        header h1 { font-size: 22px; font-weight: 700; }
        header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 2px; }
        .tabs {
            display: flex; gap: 6px; padding: 14px 16px;
            position: sticky; top: 72px; z-index: 5; background: var(--bg);
        }
        .tab {
            flex: 1; padding: 10px 0; text-align: center; border-radius: 12px;
            cursor: pointer; font-size: 14px; font-weight: 600;
            background: var(--card); color: var(--text2);
            border: 1.5px solid var(--border); transition: all 0.2s;
        }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 2px 8px rgba(217,119,108,0.3); }
        .search-bar { margin: 0 16px 12px; display: flex; gap: 8px; }
        .search-bar input {
            flex: 1; padding: 12px 16px; border-radius: 14px;
            border: 1.5px solid var(--border); font-size: 15px; background: var(--card);
            outline: none; transition: border-color 0.2s;
        }
        .search-bar input:focus { border-color: var(--accent); }
        .search-bar button {
            padding: 12px 20px; background: var(--accent);
            color: white; border: none; border-radius: 14px;
            font-size: 15px; cursor: pointer; font-weight: 600;
        }
        .filters {
            display: flex; gap: 8px; padding: 0 16px 14px;
            flex-wrap: wrap;
        }
        .filter-chip {
            padding: 8px 16px; border-radius: 22px;
            border: 1.5px solid var(--border); background: var(--card);
            font-size: 13px; cursor: pointer; white-space: nowrap; color: var(--text2);
            font-weight: 500; transition: all 0.2s;
        }
        .filter-chip:hover { border-color: var(--accent2); color: var(--text); }
        .filter-chip.active {
            background: var(--accent2); color: white; border-color: var(--accent2);
            box-shadow: 0 2px 8px rgba(232,168,124,0.3);
        }
        .context-input { margin: 0 16px 12px; display: none; gap: 8px; }
        .context-input.show { display: flex; }
        .context-input input {
            flex: 1; padding: 12px 16px; border-radius: 14px;
            border: 1.5px solid var(--border); font-size: 15px; background: var(--card);
            outline: none;
        }
        .context-input button {
            padding: 12px 20px; background: var(--accent2);
            color: white; border: none; border-radius: 14px;
            font-size: 14px; cursor: pointer; font-weight: 600;
        }
        .card-list { padding: 0 16px; }
        .card {
            background: var(--card); border-radius: var(--radius);
            padding: 20px; margin-bottom: 14px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            cursor: pointer; transition: all 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card .name { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .card .meta { display: flex; gap: 12px; margin-bottom: 8px; }
        .tag {
            font-size: 12px; padding: 3px 10px; border-radius: 10px; font-weight: 600;
        }
        .tag-easy { background: #e8f5e9; color: #27ae60; }
        .tag-medium { background: #fff3e0; color: #e8a87c; }
        .tag-hard { background: #fce4ec; color: #c0847a; }
        .card .time { font-size: 13px; color: var(--text2); }
        .card .ingredients { display: flex; flex-wrap: wrap; gap: 6px; font-size: 13px; }
        .ingredient {
            background: #fdf4ea; padding: 3px 12px; border-radius: 10px;
            font-size: 12px; color: #b88230;
        }
        .card .reasons { margin-top: 8px; font-size: 12px; color: var(--accent); font-weight: 600; }
        .card .actions { display: flex; gap: 8px; margin-top: 14px; }
        .btn {
            padding: 9px 16px; border-radius: 10px;
            border: 1.5px solid var(--border); background: var(--card);
            font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        .btn-like { color: #27ae60; border-color: #27ae60; }
        .btn-like:hover { background: #e8f5e9; }
        .btn-like.active { background: #27ae60; color: white; }
        .btn-dislike { color: #c0847a; border-color: #c0847a; }
        .btn-dislike:hover { background: #fdf2f0; }
        .btn-dislike.active { background: #c0847a; color: white; }
        .btn-order {
            background: var(--accent); color: white; border: none;
            flex: 1; text-align: center;
        }
        .btn-order:hover { opacity: 0.9; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 100;
            display: flex; align-items: flex-end; justify-content: center;
            backdrop-filter: blur(2px);
        }
        .modal-content {
            background: var(--card); width: 100%; max-width: 500px;
            border-radius: 22px 22px 0 0; padding: 28px;
            max-height: 80vh; overflow-y: auto;
        }
        .modal h2 { font-size: 22px; margin-bottom: 12px; }
        .modal .step {
            padding: 10px 0; border-bottom: 1px solid var(--border);
            display: flex; gap: 12px; font-size: 15px;
        }
        .step-num {
            width: 28px; height: 28px; background: var(--accent);
            color: white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; flex-shrink: 0;
        }
        .btn-close {
            width: 100%; padding: 14px; background: var(--accent);
            color: white; border: none; border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px;
        }
        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: #3d3432; color: white; padding: 12px 24px;
            border-radius: 24px; font-size: 14px; font-weight: 600;
            z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .empty { text-align: center; padding: 60px 20px; color: var(--text2); font-size: 15px; }
        .profile-bar {
            margin: 0 16px 14px; padding: 16px;
            background: var(--card); border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex; align-items: center; gap: 14px;
            font-size: 13px; color: var(--text2);
        }
    
        /* в”Җв”Җ Desktop (>768px) в”Җв”Җ */
        @media (min-width: 768px) {
            body { max-width: 1200px; margin: 0 auto; background: #f5f3f0; }
            header { border-radius: 0 0 24px 24px; padding: 28px 36px; }
            header h1 { font-size: 28px; }
            .tabs { max-width: 600px; margin: 0 auto; position: static; padding: 24px 0 16px; background: transparent; }
            .search-bar { max-width: 600px; margin: 0 auto 16px; }
            .filters { max-width: 600px; margin: 0 auto 16px; justify-content: center; }
            .context-input { max-width: 600px; margin: 0 auto 16px; }
            .card-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; max-width: 900px; margin: 0 auto; padding: 0 24px; }
            .card { margin-bottom: 0; transition: transform 0.2s, box-shadow 0.2s; }
            .card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.08); }
            .card:active { transform: scale(0.99); }
            .profile-bar { max-width: 600px; margin: 0 auto 16px; }
            #profile-view { max-width: 600px; margin: 0 auto; }
            .modal-content { border-radius: 24px; max-width: 600px; max-height: 85vh; }
            .toast { bottom: 40px; font-size: 15px; padding: 14px 28px; }
        }
        @media (min-width: 1024px) {
            .card-list { grid-template-columns: repeat(3, 1fr); max-width: 1100px; }
            .card { padding: 24px; }
            .card .name { font-size: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>иҖҒе©ҶзӮ№иҸң рҹҚі</h1>
        <div class="subtitle" id="header-sub">дҪ зҡ„дё“еұһжҷәиғҪиҸңеҚ•</div>
    </header>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('recommend')">вңЁ жҺЁиҚҗ</div>
        <div class="tab" onclick="switchTab('context')">рҹ’¬ жғіеҗғе•Ҙ</div>
        <div class="tab" onclick="switchTab('browse')">рҹ“– е…ЁйғЁиҸңи°ұ</div>
        <div class="tab" onclick="switchTab('profile')">рҹ‘Ө жҲ‘зҡ„еҸЈе‘і</div>
    </div>
    
    <div class="search-bar" id="search-bar" style="display:none">
        <input type="text" placeholder="жҗңиҸңеҗҚгҖҒжҗңйЈҹжқҗ..." id="search-input" oninput="search()">
    </div>
    
    <div class="filters" id="filters" style="display:none">
        <button class="filter-chip active" onclick="setFilter('all', this)">е…ЁйғЁ</button>
        <button class="filter-chip" onclick="setFilter('дёӢйҘӯ', this)">рҹҚҡ дёӢйҘӯ</button>
        <button class="filter-chip" onclick="setFilter('йә»иҫЈ', this)">рҹҢ¶пёҸ йә»иҫЈ</button>
        <button class="filter-chip" onclick="setFilter('жё…ж·Ў', this)">рҹҘ¬ жё…ж·Ў</button>
        <button class="filter-chip" onclick="setFilter('й…ёз”ң', this)">рҹҚӢ й…ёз”ң</button>
        <button class="filter-chip" onclick="setFilter('йІңйҰҷ', this)">рҹҰҗ йІңйҰҷ</button>
        <button class="filter-chip" onclick="setFilter('зҲҪеҸЈ', this)">рҹҘ’ зҲҪеҸЈ</button>
        <button class="filter-chip" onclick="setFilter('жө“йғҒ', this)">рҹҚІ жө“йғҒ</button>
        <button class="filter-chip" onclick="setFilter('й…Ҙи„Ҷ', this)">рҹҘҗ й…Ҙи„Ҷ</button>
        <button class="filter-chip" onclick="setFilter('иҪҜзіҜ', this)">рҹҚ  иҪҜзіҜ</button>
        <button class="filter-chip" onclick="setFilter('ејҖиғғ', this)">рҹӨӨ ејҖиғғ</button>
        <button class="filter-chip" onclick="setFilter('еҝ«жүӢ', this)">вҡЎ еҝ«жүӢ</button>
    </div>
    
    <div class="context-input" id="context-input">
        <input type="text" placeholder="жғіеҗғиҫЈзҡ„гҖҒжғіеҗғиӮүгҖҒжқҘзӮ№жё…зҲҪзҡ„..." id="context-query" onkeydown="if(event.key==='Enter')recommendContext()">
        <button onclick="recommendContext()">жүҫиҸң</button>
    </div>
    
    <div class="card-list" id="card-list"></div>
    <div id="profile-view" style="display:none; padding: 0 16px;"></div>
    
    <div class="modal" id="modal" style="display:none" onclick="closeModal(event)">
        <div class="modal-content" id="modal-content" onclick="event.stopPropagation()"></div>
    </div>
    
    <div class="toast" id="toast"></div>

<script>
var API = '';
var currentTab = 'recommend';
var currentFilter = 'all';
var allRecipes = [];
var profile = {};
var _currentRecipes = [];

async function init() {
    try {
        await Promise.all([loadRecipes(), loadProfile()]);
        switchTab('recommend');
    } catch(e) {
        console.error('Init failed:', e);
        document.getElementById('card-list').innerHTML = '<div class="empty">еҠ иҪҪеӨұиҙҘпјҢиҜ·еҲ·ж–°йЎөйқўйҮҚиҜ•</div>';
    }
}

async function loadRecipes() {
    var res = await fetch(API + '/api/recipes/all');
    var data = await res.json();
    allRecipes = data.recipes || [];
}

async function loadProfile() {
    var res = await fetch(API + '/api/user/profile');
    profile = await res.json();
}

function switchTab(tab) {
    currentTab = tab;
    var tabs = document.querySelectorAll('.tab');
    var tabNames = ['recommend','context','browse','profile'];
    tabs.forEach(function(t, i) {
        t.classList.toggle('active', tabNames[i] === tab);
    });
    
    document.getElementById('search-bar').style.display = tab === 'browse' ? 'flex' : 'none';
    document.getElementById('filters').style.display = tab === 'browse' ? 'flex' : 'none';
    document.getElementById('context-input').classList.toggle('show', tab === 'context');
    document.getElementById('profile-view').style.display = tab === 'profile' ? 'block' : 'none';
    document.getElementById('card-list').style.display = tab !== 'profile' ? 'block' : 'none';
    
    if (tab === 'recommend') loadRecommend();
    else if (tab === 'context') { document.getElementById('context-query').focus(); renderCards([]); }
    else if (tab === 'browse') { document.getElementById('search-input').value = ''; renderAll(); }
    else if (tab === 'profile') renderProfile();
}

async function loadRecommend() {
    var res = await fetch(API + '/api/recommend/daily');
    var data = await res.json();
    document.getElementById('header-sub').textContent = 'д»Ҡж—ҘдёәдҪ зІҫйҖү';
    renderCards(data.recommendations || []);
}

async function recommendContext() {
    var query = document.getElementById('context-query').value.trim();
    if (!query) return;
    var res = await fetch(API + '/api/recommend/context', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({context: query})
    });
    var data = await res.json();
    document.getElementById('header-sub').textContent = '"' + query + '" зҡ„жҺЁиҚҗ';
    renderCards(data.recommendations || []);
}

function search() {
    var keyword = document.getElementById('search-input').value.toLowerCase();
    if (!keyword) { renderAll(); return; }
    var filtered = allRecipes.filter(function(r) {
        return r.name.toLowerCase().indexOf(keyword) >= 0 ||
            r.ingredients.some(function(i) { return i.toLowerCase().indexOf(keyword) >= 0; });
    });
    renderCards(filtered);
}

function setFilter(filter, el) {
    currentFilter = filter;
    var chips = document.querySelectorAll('.filter-chip');
    chips.forEach(function(c) { c.classList.remove('active'); });
    el.classList.add('active');
    renderAll();
}

function renderAll() {
    var recipes = allRecipes.slice();
    
    var tasteKeywords = {
        'дёӢйҘӯ': ['зәўзғ§','з„–','зӮ–','й…ұ','зғ§','еҚӨ','еӣһй”…','е№Із…ё','е®«дҝқ','йұјйҰҷ','йә»е©Ҷ','ж°ҙз…®','е°ҸзӮ’','иӮүжң«','и’ңи“ү','иҡқжІ№','й”…еҢ…','дә¬й…ұ','й»„з„–','е’–е–ұ','з•ӘиҢ„'],
        'йә»иҫЈ': ['йә»иҫЈ','иҫЈ','иҫЈжӨ’','иҠұжӨ’','е№ІиҫЈжӨ’','зәўжІ№','еүҒжӨ’','жіЎжӨ’','иұҶз“Ј','йә»е©Ҷ','ж°ҙз…®','иҫЈеӯҗ','йҰҷиҫЈ','й…ёиҫЈ','и—ӨжӨ’'],
        'жё…ж·Ў': ['жё…и’ё','зҷҪзҒј','жё…зӮ’','ж°ҙз…®','и’ё','з…®','з„Ҝ','зҙ ','еҮүжӢҢ','йқ’иҸң','иұҶи…җ','зІҘ','жұӨ'],
        'й…ёз”ң': ['зі–йҶӢ','й…ёз”ң','иҢ„жұҒ','з•ӘиҢ„','жҹ жӘ¬','иҸ иҗқ','ж©ҷжұҒ','еұұжҘӮ','й…ёжў…'],
        'йІңйҰҷ': ['йІң','йҰҷ','иҡқжІ№','и’ңи“ү','и‘ұжІ№','иҸҢиҸҮ','дёүйІң','дёҠжұӨ','й«ҳжұӨ','йІҚжұҒ','иҷҫ','иҹ№','иҙқ'],
        'зҲҪеҸЈ': ['еҮүжӢҢ','еҮү','жӢҚй»„з“ң','жІҷжӢү','з”ҹиҸң','жё…и„Ҷ','зҲҪеҸЈ','йҶӢ','й…ёиҫЈ','жіЎиҸң','й…ё'],
        'жө“йғҒ': ['зәўзғ§','зӮ–','з„–','з…І','еҚӨ','е’–е–ұ','еҘ¶жІ№','иҠқеЈ«','й»„жІ№','жө“жұӨ','з Ӯй”…','дёңеқЎ','дҪӣи·іеўҷ'],
        'й…Ҙи„Ҷ': ['и„Ҷ','й…Ҙ','зӮё','з…Һ','зғӨ','и„Ҷзҡ®','йҰҷй…Ҙ','е№Із…ё','зҲҶ','й”…е·ҙ','жҺ’'],
        'иҪҜзіҜ': ['зіҜ','зІүи’ё','зӮ–','з„–','з…І','зәўзғ§иӮү','дёңеқЎиӮү','жүЈиӮү','и№„','иӮҳ','зүӣи…©','иҠӢеӨҙ','еұұиҚҜ'],
        'ејҖиғғ': ['й…ё','иҫЈ','йҶӢ','жіЎ','и…Ң','зіҹ','ејҖиғғ','дёӢйҘӯ','йұјйҰҷ','зі–йҶӢ','й…ёиҫЈ','йә»иҫЈ','еҮүжӢҢ'],
        'еҝ«жүӢ': [],
    };
    
    if (currentFilter !== 'all' && tasteKeywords[currentFilter]) {
        var kws = tasteKeywords[currentFilter];
        // ејәеҸЈе‘ізұ»еҲ«еҸӘзңӢиҸңеҗҚпјҢйҒҝе…ҚйЈҹжқҗиҜҜдјӨпјҲеҰӮзәўзғ§йұјеқ—ж”ҫдҝ©е№ІиҫЈжӨ’вү йә»иҫЈпјү
        var nameOnlyFilters = ['йә»иҫЈ', 'й…ёз”ң', 'жө“йғҒ', 'й…Ҙи„Ҷ', 'иҪҜзіҜ'];
        var matchOnNameOnly = nameOnlyFilters.indexOf(currentFilter) >= 0;
        
        if (currentFilter === 'еҝ«жүӢ') {
            recipes = recipes.filter(function(r) {
                var t = r.time || '';
                var m = parseInt(t);
                return m && m <= 20;
            });
        } else {
            recipes = recipes.filter(function(r) {
                var text = matchOnNameOnly ? r.name : (r.name + ' ' + (r.ingredients || []).join(' '));
                return kws.some(function(kw) { return text.indexOf(kw) >= 0; });
            });
        }
    }
    
    var keyword = document.getElementById('search-input').value.toLowerCase();
    if (keyword) {
        recipes = recipes.filter(function(r) {
            return r.name.toLowerCase().indexOf(keyword) >= 0 ||
                r.ingredients.some(function(i) { return i.toLowerCase().indexOf(keyword) >= 0; });
        });
    }
    
    document.getElementById('header-sub').textContent = 'е…ұ ' + recipes.length + ' йҒ“иҸң';
    renderCards(recipes);
}

function renderCards(recipes) {
    var container = document.getElementById('card-list');
    if (!recipes.length) {
        container.innerHTML = '<div class="empty">рҹҚҪпёҸ жІЎжңүжүҫеҲ°еҢ№й…Қзҡ„иҸңпјҢиҜ•иҜ•жҚўдёӘиҜҙжі•пјҹ</div>';
        return;
    }
    
    _currentRecipes = recipes;
    var html = '';
    for (var i = 0; i < recipes.length; i++) {
        var r = recipes[i];
        var diffClass = r.difficulty === 'з®ҖеҚ•' ? 'tag-easy' : r.difficulty === 'еӣ°йҡҫ' ? 'tag-hard' : 'tag-medium';
        var reasonsHtml = r._reasons ? '<div class="reasons">' + r._reasons.join(' ') + '</div>' : '';
        var isFav = (profile.favorites || []).indexOf(r.name) >= 0;
        var isDis = (profile.dislikes || []).indexOf(r.name) >= 0;
        var scoreStar = r._score > 80 ? ' вӯҗ' : '';
        var ings = (r.ingredients || []).slice(0, 6).map(function(ing) {
            return '<span class="ingredient">' + ing + '</span>';
        }).join('');
        
        html += '<div class="card" onclick="openDetail(' + i + ')">';
        html += '<div class="name">' + r.name + scoreStar + '</div>';
        html += '<div class="meta">';
        html += '<span class="tag ' + diffClass + '">' + (r.difficulty || '?') + '</span>';
        html += '<span class="time">вҸұ ' + (r.time || '?') + '</span>';
        html += '</div>';
        html += '<div class="ingredients">' + ings + '</div>';
        html += reasonsHtml;
        html += '<div class="actions" onclick="event.stopPropagation()">';
        html += '<button class="btn btn-like' + (isFav ? ' active' : '') + '" onclick="toggleFavorite(\'' + r.name.replace(/'/g, "\\'") + '\', this)">' + (isFav ? 'вқӨпёҸ' : 'рҹӨҚ') + ' е–ңж¬ў</button>';
        html += '<button class="btn btn-dislike' + (isDis ? ' active' : '') + '" onclick="toggleDislike(\'' + r.name.replace(/'/g, "\\'") + '\', this)">дёҚеҗғ</button>';
        html += '<button class="btn btn-order" onclick="orderDish(\'' + r.name.replace(/'/g, "\\'") + '\', this)">е°ұеҗғиҝҷдёӘ</button>';
        html += '</div></div>';
    }
    container.innerHTML = html;
}

function openDetail(idx) {
    var r = _currentRecipes[idx];
    if (!r) return;
    var diffClass = r.difficulty === 'з®ҖеҚ•' ? 'tag-easy' : r.difficulty === 'еӣ°йҡҫ' ? 'tag-hard' : 'tag-medium';
    var stepsHtml = (r.steps || []).map(function(s, i) {
        return '<div class="step"><span class="step-num">' + (i+1) + '</span><span>' + s + '</span></div>';
    }).join('');
    
    var content = document.getElementById('modal-content');
    content.innerHTML = '<h2>' + r.name + '</h2>' +
        '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">' +
        '<span class="tag ' + diffClass + '">' + (r.difficulty || '?') + '</span>' +
        '<span style="font-size:13px;color:#999089">вҸұ ' + (r.time || '?') + '</span></div>' +
        '<div style="font-size:14px;color:#999089;margin-bottom:8px">йЈҹжқҗпјҡ' + (r.ingredients || []).join('гҖҒ') + '</div>' +
        '<h3 style="margin:16px 0 10px;color:#3d3432">рҹ“қ еҒҡжі•</h3>' +
        '<div>' + stepsHtml + '</div>' +
        '<button class="btn-close" onclick="closeModal()">зҹҘйҒ“дәҶ</button>';
    document.getElementById('modal').style.display = 'flex';
}

function closeModal(e) {
    if (e && e.target !== document.getElementById('modal')) return;
    document.getElementById('modal').style.display = 'none';
}

async function toggleFavorite(name, btn) {
    var isFav = (profile.favorites || []).indexOf(name) >= 0;
    var url = API + (isFav ? '/api/user/unfavorite' : '/api/user/favorite');
    var res = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({dish: name})
    });
    profile = await res.json();
    toast(isFav ? 'е·ІеҸ–ж¶Ҳж”¶и—Ҹ' : 'е·ІеҠ е…Ҙж”¶и—Ҹ вқӨпёҸ');
    refreshCurrentView();
}

async function toggleDislike(name, btn) {
    var isDis = (profile.dislikes || []).indexOf(name) >= 0;
    var url = API + (isDis ? '/api/user/undislike' : '/api/user/dislike');
    var res = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({dish: name})
    });
    profile = await res.json();
    toast(isDis ? 'е·ІеҸ–ж¶Ҳ' : 'е·Іж Үи®°дёҚе–ңж¬ў');
    refreshCurrentView();
}

async function orderDish(name, btn) {
    var res = await fetch(API + '/api/order', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({dish: name})
    });
    await res.json();
    toast('вң… д»ҠеӨ©еҗғгҖҢ' + name + 'гҖҚпјҒе·Іи®°еҪ•');
    await loadProfile();
}

function refreshCurrentView() {
    if (currentTab === 'recommend') loadRecommend();
    else if (currentTab === 'browse') renderAll();
}

function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2000);
}

function renderProfile() {
    var view = document.getElementById('profile-view');
    var taste = profile.taste || {};
    var pref = profile.preferences || {};
    var stats = profile.stats || {};
    var tasteLabels = {
        spiciness: ['дёҚеҗғиҫЈ','еҫ®еҫ®иҫЈ','еҫ®иҫЈ','дёӯиҫЈ','еҫҲиҫЈ','ж— иҫЈдёҚж¬ў'],
        saltiness: ['жһҒж·Ў','еҒҸж·Ў','жӯЈеёё','еҒҸе’ё','еҫҲе’ё','йҮҚе’ё'],
        sweetness: ['дёҚз”ң','еҫ®з”ң','жӯЈеёё','еҒҸз”ң','еҫҲз”ң','е—ңз”ң'],
        sourness: ['дёҚй…ё','еҫ®й…ё','жӯЈеёё','еҒҸй…ё','еҫҲй…ё','е—ңй…ё']
    };
    var tasteNames = {spiciness:'иҫЈеәҰ', saltiness:'е’ёеәҰ', sweetness:'з”ңеәҰ', sourness:'й…ёеәҰ'};
    var tasteEmoji = {spiciness:'рҹҢ¶', saltiness:'рҹ§Ӯ', sweetness:'рҹҚ¬', sourness:'рҹҚӢ'};
    
    var tasteHtml = '';
    Object.keys(taste).forEach(function(key) {
        var val = taste[key] || 0;
        var labels = tasteLabels[key] || ['?','?','?','?','?','?'];
        tasteHtml += '<div style="margin-bottom:12px">' +
            '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">' +
            '<span>' + (tasteEmoji[key]||'') + ' ' + (tasteNames[key]||key) + '</span>' +
            '<span style="color:#d9776c;font-weight:600">' + labels[val] + '</span></div>' +
            '<div style="display:flex;gap:4px">';
        for (var i = 0; i <= 5; i++) {
            tasteHtml += '<div style="flex:1;height:6px;border-radius:3px;background:' + (i <= val ? '#d9776c' : '#ede8e2') + '"></div>';
        }
        tasteHtml += '</div></div>';
    });
    
    var topDishes = profile.top_dishes || [];
    var topHtml = '';
    if (topDishes.length) {
        topDishes.forEach(function(d, i) {
            topHtml += '<div style="padding:6px 0;border-bottom:1px solid #ede8e2;display:flex;justify-content:space-between">' +
                '<span>' + (i+1) + '. ' + d.name + '</span>' +
                '<span style="color:#999089;font-size:12px">' + d.count + 'ж¬Ў</span></div>';
        });
    } else {
        topHtml = '<div style="color:#999089;font-size:13px">иҝҳжІЎжңүзӮ№иҸңи®°еҪ•</div>';
    }
    
    var favCuisines = (pref.favorite_cuisines || []).map(function(c) {
        return '<span style="background:#fdf2f0;color:#d9776c;padding:4px 12px;border-radius:10px;font-size:12px;margin:2px;display:inline-block">' + c + '</span>';
    }).join('') || '<span style="color:#999089;font-size:13px">иҝҳжІЎи®ҫзҪ®</span>';
    
    var disliked = (pref.disliked_ingredients || []).map(function(c) {
        return '<span style="background:#fdf2f0;color:#c0847a;padding:4px 12px;border-radius:10px;font-size:12px;margin:2px;display:inline-block">' + c + '</span>';
    }).join('') || '<span style="color:#999089;font-size:13px">иҝҳжІЎжңү</span>';
    
    view.innerHTML = 
        '<div class="profile-bar" style="margin-bottom:16px">' +
        '<div style="font-size:32px">рҹ‘©</div>' +
        '<div><div style="font-weight:600;color:#3d3432">зӮ№иҸң <b style="color:#d9776c">' + (stats.total_orders || 0) + '</b> ж¬Ў</div>' +
        '<div>ж”¶и—Ҹ <b style="color:#d9776c">' + ((profile.favorites || []).length) + '</b> йҒ“</div></div></div>' +
        '<div class="card" style="margin-bottom:14px"><h3 style="margin-bottom:12px;color:#3d3432">еҸЈе‘іеҒҸеҘҪ</h3>' + tasteHtml + '</div>' +
        '<div class="card" style="margin-bottom:14px"><h3 style="margin-bottom:10px;color:#3d3432">е–ңж¬ўзҡ„иҸңзі»</h3>' + favCuisines + '</div>' +
        '<div class="card" style="margin-bottom:14px"><h3 style="margin-bottom:10px;color:#3d3432">дёҚеҗғзҡ„йЈҹжқҗ</h3>' + disliked + '</div>' +
        '<div class="card" style="margin-bottom:14px"><h3 style="margin-bottom:10px;color:#3d3432">жңҖеёёзӮ№зҡ„иҸң</h3>' + topHtml + '</div>';
}

init();
</script>
